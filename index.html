<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinetic Dream — Psychedelic Museum</title>

<style>
/* ===== GLOBAL PAGE BACKGROUND — LIQUID LIGHT SHOW ===== */
body {
  margin: 0;
  background: linear-gradient(
    270deg,
    #ff00ff,
    #00ffff,
    #ffff00,
    #ff6600,
    #00ff66,
    #6600ff
  );
  background-size: 800% 800%;
  animation: kdBackgroundFlow 60s ease infinite;
  font-family: 'Trebuchet MS', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

@keyframes kdBackgroundFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== HERO BANNER — MELTING TITLE GLOW ===== */
.kd-hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.kd-hero-title {
  font-size: 3.5rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #ffffff;
  text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #00ffff,
    0 0 40px #ffff00;
  animation: kdHueShift 12s linear infinite;
}

@keyframes kdHueShift {
  0%   { filter: hue-rotate(0deg); }
  50%  { filter: hue-rotate(180deg); }
  100% { filter: hue-rotate(360deg); }
}

/* ===== FEATURED TRACKS HEADER ===== */
.kd-section-title {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 700;
  color: #ffe66d;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
  margin: 20px 0 30px;
}

/* ===== TRACK GALLERY GRID ===== */
.kd-track-grid {
  max-width: 1100px;
  margin: 0 auto 60px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
  padding: 0 20px;
}

@media (max-width: 900px) {
  .kd-track-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 600px) {
  .kd-track-grid {
    grid-template-columns: 1fr;
  }
}

/* ===== INDIVIDUAL TRACK CARD — NEON FRAME + RIPPLE ===== */
.kd-track-card {
  position: relative;
  padding: 12px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow:
    0 0 12px rgba(255, 0, 255, 0.7),
    0 0 24px rgba(0, 255, 255, 0.6);
  overflow: hidden;
  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.kd-track-card::before {
  content: "";
  position: absolute;
  inset: -40%;
  background: radial-gradient(circle at center,
    rgba(255,255,255,0.18),
    transparent 60%);
  opacity: 0;
  transform: scale(0.8);
  transition:
    opacity 0.35s ease,
    transform 0.35s ease;
}

.kd-track-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow:
    0 0 18px rgba(255, 255, 0, 0.8),
    0 0 32px rgba(0, 255, 255, 0.8);
  background: rgba(0, 0, 0, 0.75);
}

.kd-track-card:hover::before {
  opacity: 1;
  transform: scale(1.1);
}

/* ===== SOUNDCloud EMBED WRAPPER ===== */
.kd-track-embed {
  border-radius: 12px;
  overflow: hidden;
}

/* ===== CALL-TO-ACTION BUTTONS ROW ===== */
.kd-cta-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 40px 0 60px;
  flex-wrap: wrap;
}

.kd-cta {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #ffffff;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 12px rgba(0,0,0,0.8),
    0 0 20px rgba(255,255,255,0.4);
  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    filter 0.2s ease;
}

/* Orange/yellow catalog button */
.kd-cta--catalog {
  background: linear-gradient(135deg, #ff8c00, #ffff00);
}

/* Green/purple SoundCloud button */
.kd-cta--soundcloud {
  background: linear-gradient(135deg, #00ff99, #9933ff);
}

/* Breathing glow */
.kd-cta {
  animation: kdCtaBreath 4s ease-in-out infinite;
}

@keyframes kdCtaBreath {
  0%   { box-shadow: 0 0 10px rgba(255,255,255,0.3); }
  50%  { box-shadow: 0 0 22px rgba(255,255,255,0.9); }
  100% { box-shadow: 0 0 10px rgba(255,255,255,0.3); }
}

/* Hover distortion */
.kd-cta:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}

/* ===== FOOTER GLOW ===== */
.kd-footer {
  text-align: center;
  padding: 30px 20px 40px;
  color: #ffffff;
  font-size: 0.9rem;
  text-shadow: 0 0 6px rgba(0,0,0,0.8);
  animation: kdFooterHue 20s linear infinite;
}

@keyframes kdFooterHue {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* ===== OPTIONAL: PSYCHEDELIC DIVIDERS ===== */
.kd-divider {
  height: 4px;
  margin: 30px auto;
  max-width: 600px;
  border-radius: 999px;
  background: linear-gradient(90deg,
    #ff00ff,
    #00ffff,
    #ffff00,
    #ff6600,
    #00ff66,
    #6600ff);
  background-size: 300% 100%;
  animation: kdDividerFlow 12s linear infinite;
}

@keyframes kdDividerFlow {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
</style>
</head>
