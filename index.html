<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinetic Dream — Psychedelic Museum</title>

<style>
/* ===== GLOBAL PAGE BACKGROUND — LIQUID LIGHT SHOW ===== */
body {
  margin: 0;
  background: linear-gradient(
    270deg,
    #ff00ff,
    #00ffff,
    #ffff00,
    #ff6600,
    #00ff66,
    #6600ff
  );
  background-size: 800% 800%;
  animation: kdBackgroundFlow 80s ease infinite;
  font-family: 'Trebuchet MS', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

@keyframes kdBackgroundFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== FLOATING BOUNCER BEHIND GRID ===== */
#bouncer {
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 1;
  opacity: 0.55;
  pointer-events: none;
  font-size: 40px;
  filter: drop-shadow(0 0 12px magenta);
}

/* ===== BANNER ===== */
.kd-banner {
  width: 100%;
  max-width: 1920px;
  margin: 0 auto;
  text-align: center;
  padding-top: 20px;
}

.kd-banner img {
  width: auto;
  max-width: 95%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* ===== SECTION TITLE ===== */
.kd-section-title {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 700;
  color: #ffe66d;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
  margin: 40px 0 30px;
}

/* ===== OUTER GLOW FRAME (ANIMATED) ===== */
.kd-soundcloud-frame {
  max-width: 1100px;
  margin: 0 auto 70px;
  padding: 40px;
  border-radius: 26px;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  animation: kdOuterGlowPulse 6s ease-in-out infinite;
}

@keyframes kdOuterGlowPulse {
  0% {
    box-shadow:
      0 0 20px rgba(255, 0, 255, 0.7),
      0 0 40px rgba(0, 255, 255, 0.7),
      0 0 60px rgba(255, 255, 0, 0.7);
  }
  50% {
    box-shadow:
      0 0 28px rgba(255, 255, 0, 0.9),
      0 0 55px rgba(0, 255, 255, 0.9),
      0 0 75px rgba(255, 0, 255, 0.9);
  }
  100% {
    box-shadow:
      0 0 20px rgba(255, 0, 255, 0.7),
      0 0 40px rgba(0, 255, 255, 0.7),
      0 0 60px rgba(255, 255, 0, 0.7);
  }
}

/* ===== TRACK GRID ===== */
.kd-track-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 28px;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px;
  justify-items: center;
}

/* ===== TRACK CARD ===== */
.kd-track-card {
  width: 100%;
  padding: 14px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow:
    0 0 14px rgba(255, 0, 255, 0.7),
    0 0 26px rgba(0, 255, 255, 0.6);
  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.kd-track-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow:
    0 0 20px rgba(255, 255, 0, 0.9),
    0 0 34px rgba(0, 255, 255, 0.9);
  background: rgba(0, 0, 0, 0.75);
}

.kd-track-embed {
  border-radius: 12px;
  overflow: hidden;
  height: 200px;
}

/* ===== CTA BUTTONS ===== */
.kd-cta-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 40px 0 60px;
  flex-wrap: wrap;
}

.kd-cta {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #ffffff;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 12px rgba(0,0,0,0.8),
    0 0 20px rgba(255,255,255,0.4);
  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    filter 0.2s ease;
}

.kd-cta--catalog {
  background: linear-gradient(135deg, #ff8c00, #ffff00);
}

.kd-cta--soundcloud {
  background: linear-gradient(135deg, #00ff99, #9933ff);
}

.kd-cta:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}

/* ===== FOOTER ===== */
.kd-footer {
  text-align: center;
  padding: 30px 20px 40px;
  color: #ffffff;
  font-size: 0.9rem;
  text-shadow: 0 0 6px rgba(0,0,0,0.8);
}
</style>
</head>

<!-- ⭐ BOUNCER SCRIPT ⭐ -->
<script>
let x = 50, y = 50;
let dx = 0.8, dy = 0.8;
const el = document.getElementById("bouncer");

function animate() {
  const w = window.innerWidth - el.offsetWidth;
  const h = window.innerHeight - el.offsetHeight;

  x += dx;
  y += dy;

  if (x <= 0 || x >= w) dx = -dx;
  if (y <= 0 || y >= h) dy = -dy;

  el.style.left = x + "px";
  el.style.top = y + "px";

  requestAnimationFrame(animate);
}

animate();
</script>
