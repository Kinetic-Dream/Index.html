<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Dream</title>

<style>

/* ---------------- GLOBAL RESET ---------------- */
body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* ---------------- FLOATING ORB BACKGROUND ---------------- */
#orb {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(255,0,200,0.35), rgba(0,0,0,0));
    filter: blur(120px);
    transform: translate(-50%, -50%);
    animation: drift 22s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes drift {
    0%   { transform: translate(-50%, -50%) scale(1); }
    50%  { transform: translate(-48%, -52%) scale(1.15); }
    100% { transform: translate(-52%, -48%) scale(1.05); }
}

/* ---------------- PAGE TITLE ---------------- */
h1 {
    text-align: center;
    color: #ff00ff;
    text-shadow: 0 0 12px #ff00ff, 0 0 22px #ff00ff;
    margin-top: 20px;
    font-size: 3rem;
    z-index: 2;
    position: relative;
}

/* ---------------- BANNER ---------------- */
#banner {
    width: 100%;
    max-width: 1200px;
    margin: 20px auto 10px auto;
    text-align: center;
    z-index: 2;
    position: relative;
}

#banner img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 0 25px #ff00ff, 0 0 45px #00ffff;
}

/* ---------------- OUTER NEON FRAME ---------------- */
#outer-frame {
    width: 90%;
    max-width: 1200px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 22px;
    background: rgba(0,0,0,0.35);
    box-shadow:
        0 0 25px #ff00ff,
        0 0 45px #00ffff,
        inset 0 0 25px #ff00ff;
    z-index: 2;
    position: relative;
}

/* ---------------- GRID ---------------- */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    z-index: 2;
    position: relative;
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

/* ---------------- TRACK CARDS ---------------- */
.track-card {
    padding: 18px;
    border-radius: 16px;
    background: rgba(20, 20, 20, 0.65);
    box-shadow:
        0 0 18px #ff00ff,
        0 0 28px #00ffff,
        inset 0 0 18px #ff00ff;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.track-card:hover {
    transform: scale(1.03);
    box-shadow:
        0 0 28px #ff00ff,
        0 0 48px #00ffff,
        inset 0 0 28px #ff00ff;
}

iframe {
    width: 100%;
    height: 220px;
    border: none;
    border-radius: 12px;
}

</style>
</head>

<body>

<div id="orb"></div>

<div id="banner">
    <img src="kd-banner.PNG" alt="Kinetic Dream Banner">
</div>

<h1>KINETIC DREAM</h1>

<div id="outer-frame">

    <div class="grid">

        <!-- WEIRD MAGIC -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2343295079&color=%23be7691&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <!-- ALL ALONE -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2343295361&color=%23ec0a5f&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <!-- LUCY'S DREAM -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2221514984&color=%23ec0a5f&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <!-- ONE (TRIBUTE TO PINK FLOYD) -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2237825525&color=%23ec0a5f&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <!-- ECHOES THAT BRUISE -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2343293759&color=%23ec0a5f&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <!-- YOUR ORIGINAL SIXTH TRACK (PLACEHOLDER) -->
        <div class="track-card">
            <iframe scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/123456789&color=%23ff00ff&visual=true">
            </iframe>
        </div>

    </div>

</div>

</body>
</html>
