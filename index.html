<style>
/* ===== GLOBAL PAGE BACKGROUND — LIQUID LIGHT SHOW ===== */
body {
  margin: 0;
  background: linear-gradient(
    270deg,
    #ff00ff,
    #00ffff,
    #ffff00,
    #ff6600,
    #00ff66,
    #6600ff
  );
  background-size: 800% 800%;
  animation: kdBackgroundFlow 60s ease infinite;
  font-family: 'Trebuchet MS', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

@keyframes kdBackgroundFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== KINETIC DREAM BANNER ===== */
.kd-banner {
  width: 100%;
  max-width: 1920px;
  margin: 0 auto;
  text-align: center;
  padding-top: 20px;
}

.kd-banner img {
  width: auto;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* ===== FEATURED TRACKS HEADER ===== */
.kd-section-title {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 700;
  color: #ffe66d;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
  margin: 20px 0 30px;
}

/* ===== TRACK CARD ===== */
.kd-track-card {
  position: relative;
  padding: 12px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow:
    0 0 12px rgba(255, 0, 255, 0.7),
    0 0 24px rgba(0, 255, 255, 0.6);
  overflow: hidden;
  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.kd-track-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow:
    0 0 18px rgba(255, 255, 0, 0.8),
    0 0 32px rgba(0, 255, 255, 0.8);
  background: rgba(0, 0, 0, 0.75);
}

.kd-track-embed {
  border-radius: 12px;
  overflow: hidden;
}

/* ⭐ NEW: GLOW FRAME AROUND SOUNDCLOUD BLOCK ⭐ */

/* ===== CTA BUTTONS ===== */
.kd-cta-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 40px 0 60px;
  flex-wrap: wrap;
}

.kd-cta {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #ffffff;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 12px rgba(0,0,0,0.8),
    0 0 20px rgba(255,255,255,0.4);
  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    filter 0.2s ease;
}

.kd-cta--catalog {
  background: linear-gradient(135deg, #ff8c00, #ffff00);
}

.kd-cta--soundcloud {
  background: linear-gradient(135deg, #00ff99, #9933ff);
}

.kd-cta:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}

/* ===== FOOTER ===== */
.kd-footer {
  text-align: center;
  padding: 30px 20px 40px;

  font-size: 0.9rem;
  text-shadow: 0 0 6px rgba(0,0,0,0.8);
